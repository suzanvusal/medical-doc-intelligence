apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-doc-api
  namespace: medical-doc-intelligence
  labels:
    app: medical-doc-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medical-doc-api
  template:
    metadata:
      labels:
        app: medical-doc-api
    spec:
      containers:
        - name: api
          image: YOUR_REGISTRY/medical-doc-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
            - name: CHROMADB_HOST
              value: "chromadb-service"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: medical-doc-secrets
                  key: redis-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medical-doc-api-service
  namespace: medical-doc-intelligence
spec:
  selector:
    app: medical-doc-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

